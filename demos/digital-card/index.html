<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajesh Ramdas - Digital Card</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #2d1b4e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .card-container {
            width: 100%;
            max-width: 420px;
        }
        .card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 40px 32px;
            color: #fff;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF3621, #FF6A33);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            margin: 0 auto 20px;
            letter-spacing: 1px;
            box-shadow: 0 8px 24px rgba(255,54,33,0.3);
        }
        .name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .title {
            font-size: 15px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 4px;
        }
        .company {
            font-size: 16px;
            font-weight: 600;
            color: #FF6A33;
            margin-bottom: 28px;
        }
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 0 0 24px;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 14px;
            text-decoration: none;
            color: #fff;
            transition: background 0.2s;
            font-size: 15px;
        }
        .info-row:hover { background: rgba(255,255,255,0.08); }
        .info-row .icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .icon-phone { background: rgba(52,199,89,0.2); color: #34c759; }
        .icon-email { background: rgba(0,122,255,0.2); color: #007aff; }
        .info-text {
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 2px;
        }
        .qr-section {
            margin-top: 28px;
            padding-top: 28px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .qr-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 16px;
        }
        #qrcode {
            display: inline-block;
            padding: 16px;
            background: #fff;
            border-radius: 16px;
        }
        #qrcode canvas { display: block; }
        .actions {
            margin-top: 24px;
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: transform 0.15s, opacity 0.15s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, #FF3621, #FF6A33);
            color: #fff;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        .databricks-badge {
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card">
            <div class="avatar">RR</div>
            <div class="name">Rajesh Ramdas</div>
            <div class="title">Senior Director - Field Engineering</div>
            <div class="company">Databricks India</div>
            <div class="divider"></div>

            <a href="tel:+919582264238" class="info-row">
                <div class="icon icon-phone">&#9742;</div>
                <div class="info-text">
                    <div class="info-label">Phone</div>
                    +91 958 226 4238
                </div>
            </a>

            <a href="mailto:rajesh.ramdas@databricks.com" class="info-row">
                <div class="icon icon-email">&#9993;</div>
                <div class="info-text">
                    <div class="info-label">Email</div>
                    rajesh.ramdas@databricks.com
                </div>
            </a>

            <div class="qr-section">
                <div class="qr-label">Scan to save contact</div>
                <div id="qrcode"></div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" onclick="downloadVCard()">Save Contact</button>
                <button class="btn btn-secondary" onclick="shareCard()">Share</button>
            </div>

            <div class="databricks-badge">DATABRICKS</div>
        </div>
    </div>

    <script>
        const vcard = [
            'BEGIN:VCARD',
            'VERSION:3.0',
            'N:Ramdas;Rajesh;;;',
            'FN:Rajesh Ramdas',
            'ORG:Databricks India',
            'TITLE:Senior Director - Field Engineering',
            'TEL;TYPE=CELL:+919582264238',
            'EMAIL;TYPE=WORK:rajesh.ramdas@databricks.com',
            'END:VCARD'
        ].join('\n');

        new QRCode(document.getElementById('qrcode'), {
            text: vcard,
            width: 180,
            height: 180,
            colorDark: '#1a1a3e',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
        });

        function downloadVCard() {
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Rajesh_Ramdas.vcf';
            a.click();
            URL.revokeObjectURL(url);
        }

        async function shareCard() {
            if (navigator.share) {
                try {
                    const blob = new Blob([vcard], { type: 'text/vcard' });
                    const file = new File([blob], 'Rajesh_Ramdas.vcf', { type: 'text/vcard' });
                    await navigator.share({
                        title: 'Rajesh Ramdas - Databricks',
                        text: 'Contact card for Rajesh Ramdas',
                        files: [file]
                    });
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        fallbackShare();
                    }
                }
            } else {
                fallbackShare();
            }
        }

        function fallbackShare() {
            navigator.clipboard.writeText(
                'Rajesh Ramdas\nDatabricks India\n+91 958 226 4238\nrajesh.ramdas@databricks.com'
            ).then(() => {
                const btn = document.querySelector('.btn-secondary');
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Share', 2000);
            });
        }
    </script>
</body>
</html>
